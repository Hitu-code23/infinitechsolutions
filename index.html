<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;cursor:crosshair}
canvas{display:block}

#title{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:10;
  color:rgba(180,220,255,.7);font-family:'Orbitron',sans-serif;font-size:.7rem;
  letter-spacing:8px;text-transform:uppercase;text-shadow:0 0 20px rgba(120,180,255,.4);
  pointer-events:none}

#depth-ui{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:10;
  text-align:center;pointer-events:none}
#depth{color:rgba(140,200,255,.8);font-family:'Orbitron',sans-serif;font-size:.65rem;
  letter-spacing:5px}
#hint{color:rgba(255,255,255,.25);font-size:.62rem;letter-spacing:2px;margin-top:8px;
  font-family:'Rajdhani',sans-serif}

#planet-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;pointer-events:none;text-align:center;opacity:0;transition:opacity .3s}
#planet-label .name{color:#fff;font-family:'Orbitron',sans-serif;font-size:1.4rem;
  letter-spacing:6px;text-shadow:0 0 30px currentColor}
#planet-label .sub{color:rgba(255,255,255,.4);font-size:.65rem;letter-spacing:4px;margin-top:6px}

#gesture-panel{position:fixed;top:72px;right:24px;z-index:10;
  background:rgba(0,10,30,.6);border:1px solid rgba(80,160,255,.15);
  border-radius:8px;padding:12px 16px;pointer-events:none;
  backdrop-filter:blur(10px);min-width:160px}
#gesture-icon{font-size:1.5rem;text-align:center;margin-bottom:6px}
#gesture-name{color:rgba(100,180,255,.8);font-size:.6rem;letter-spacing:3px;
  font-family:'Orbitron',sans-serif;text-align:center}
.g-row{display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;padding-top:8px;border-top:1px solid rgba(80,160,255,.08)}
.g-label{color:rgba(255,255,255,.3);font-size:.55rem;letter-spacing:2px}
.g-val{color:rgba(100,200,255,.7);font-size:.55rem;letter-spacing:1px}

#hover-name{position:fixed;pointer-events:none;z-index:15;
  color:#fff;font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:4px;
  text-shadow:0 0 15px rgba(150,200,255,.8);opacity:0;transition:opacity .2s;
  padding:6px 12px;background:rgba(0,10,40,.6);border:1px solid rgba(100,180,255,.2);
  border-radius:4px;backdrop-filter:blur(8px)}

.vignette{position:fixed;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,10,.8) 100%)}
.stars-overlay{position:fixed;inset:0;pointer-events:none;z-index:3;
  background:radial-gradient(circle at 30% 20%,rgba(100,150,255,.03) 0%,transparent 60%)}

#back-btn{position:fixed;top:24px;left:24px;z-index:10;
  color:rgba(100,180,255,.6);font-family:'Orbitron',sans-serif;font-size:.6rem;
  letter-spacing:3px;cursor:pointer;padding:8px 16px;
  border:1px solid rgba(100,180,255,.2);border-radius:4px;
  background:rgba(0,10,30,.5);backdrop-filter:blur(8px);
  transition:all .2s;display:none}
#back-btn:hover{color:rgba(150,210,255,.9);border-color:rgba(100,180,255,.4);
  background:rgba(10,30,80,.5)}

video{display:none}
</style>
</head>

<div class="vignette"></div>

<div id="back-btn" onclick="onZoomOut()">◀ BACK</div>
<div id="depth-ui">
  <div id="depth">SOLAR SYSTEM</div>
  <div id="hint">CLICK PLANET TO DIVE · RIGHT-CLICK BACK · SCROLL ZOOM</div>
</div>
<div id="planet-label"><div class="name" id="pl-name"></div><div class="sub" id="pl-sub"></div></div>
<div id="hover-name"></div>
<div id="gesture-panel">
  <div id="gesture-icon">✋</div>
  <div id="gesture-name">NO HAND</div>
  <div class="g-row"><span class="g-label">ZOOM</span><span class="g-val" id="g-zoom">—</span></div>
  <div class="g-row"><span class="g-label">ACTION</span><span class="g-val" id="g-action">—</span></div>
</div>
<video id="hand-video" playsinline></video>

<script>

      {name:'Enceladus', radius:.08, orbitR:2.4, speed:7, color:'#e8e8f0', desc:'ICE GEYSERS MOON'},

    ]
  },

    tilt:97.8, hasRings:true, ringsNarrow:true,
    moons:[
      {name:'Miranda', radius:.07, orbitR:1.4, speed:8, color:'#b0b8c0', desc:'PATCHWORK MOON'},

    ]
  },
  {

    tilt:28,
    moons:[
      {name:'Triton', radius:.14, orbitR:1.9, speed:-2.8, color:'#c0d8e8', desc:'RETROGRADE CAPTURED MOON'}
    ]

// ─── TEXTURE GENERATOR ────────────────────────────────────────────────────────
function createTexture(type, size=512) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size/2;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;

  const rng = (seed) => { // Simple seeded noise
    let s = seed;
    return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
  };

  function noise(ctx, w, h, rand, alpha=0.15) {
    const id = ctx.createImageData(w, h);
    for(let i=0;i<id.data.length;i+=4){
      const v = rand()*255;
      id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=alpha*255;
    }
    ctx.putImageData(id,0,0);
  }

  switch(type) {
    case 'sun': {
      const g = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
      g.addColorStop(0,'#fff8c0'); g.addColorStop(.3,'#ffda00');
      g.addColorStop(.7,'#ff8800'); g.addColorStop(1,'#ff4400');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      const r=rng(42);
      // Solar granules
      for(let i=0;i<400;i++){
        const x=r()*w, y=r()*h, rad=r()*20+5;
        const gr=ctx.createRadialGradient(x,y,0,x,y,rad);
        gr.addColorStop(0,'rgba(255,255,200,0.25)');
        gr.addColorStop(1,'rgba(200,100,0,0)');
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      }
      // Solar flare streaks
      for(let i=0;i<12;i++){
        const a=r()*Math.PI*2, len=w*(.1+r()*.2);
        ctx.strokeStyle=`rgba(255,220,80,${.1+r()*.15})`;
        ctx.lineWidth=r()*8+2; ctx.beginPath();
        ctx.moveTo(w/2+Math.cos(a)*w*.3, h/2+Math.sin(a)*h*.3);
        ctx.lineTo(w/2+Math.cos(a)*len, h/2+Math.sin(a)*len);
        ctx.stroke();
      }
      break;
    }
    case 'mercury': {
      ctx.fillStyle='#8a8a8a'; ctx.fillRect(0,0,w,h);
      const r=rng(7);
      for(let i=0;i<200;i++){
        const x=r()*w, y=r()*h, rad=r()*15+2;
        const dark=r()>.5;
        const gr=ctx.createRadialGradient(x,y,0,x,y,rad);
        gr.addColorStop(0,dark?'rgba(50,50,50,0.6)':'rgba(160,160,160,0.4)');
        gr.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=.2; noise(ctx,w,h,rng(77)); ctx.globalAlpha=1;
      break;
    }
    case 'venus': {
      ctx.fillStyle='#d4a855'; ctx.fillRect(0,0,w,h);
      const r=rng(13);
      // Cloud bands
      for(let i=0;i<20;i++){
        const y=r()*h, bandH=r()*40+10;
        ctx.fillStyle=`rgba(${180+r()*60|0},${140+r()*40|0},${60+r()*40|0},0.4)`;
        ctx.fillRect(0,y,w,bandH);
      }
      // Swirling clouds
      for(let i=0;i<60;i++){
        const x=r()*w, y=r()*h, rx=r()*80+20, ry=r()*20+5;
        ctx.fillStyle=`rgba(220,180,100,${r()*.25})`;
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,r()*Math.PI,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'earth': {
      // Ocean base
      ctx.fillStyle='#1a4a8a'; ctx.fillRect(0,0,w,h);
      const r=rng(21);
      // Continents
      const continents = [
        // Americas
        {x:.2, y:.35, rx:.12, ry:.22, rot:-.3},
        {x:.22, y:.55, rx:.07, ry:.18, rot:.2},
        // Eurasia
        {x:.52, y:.32, rx:.2, ry:.13, rot:.1},
        // Africa
        {x:.5, y:.52, rx:.07, ry:.16, rot:.0},
        // Australia
        {x:.72, y:.6, rx:.07, ry:.06, rot:.2},
        // Antarctica
        {x:.5, y:.85, rx:.25, ry:.05, rot:0},
      ];
      continents.forEach(cont => {
        const cx=cont.x*w, cy=cont.y*h;
        const g2=ctx.createRadialGradient(cx,cy,0,cx,cy,cont.rx*w);
        g2.addColorStop(0,'rgba(60,120,30,0.95)');
        g2.addColorStop(.5,'rgba(40,100,20,0.9)');
        g2.addColorStop(1,'rgba(30,80,10,0)');
        ctx.fillStyle=g2;
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(cont.rot);
        ctx.scale(1, cont.ry/cont.rx); ctx.beginPath();
        ctx.arc(0,0,cont.rx*w,0,Math.PI*2); ctx.restore(); ctx.fill();
      });
      // Ice caps
      const capG=ctx.createLinearGradient(0,0,0,h*.12);
      capG.addColorStop(0,'rgba(240,248,255,0.95)'); capG.addColorStop(1,'rgba(200,230,255,0)');
      ctx.fillStyle=capG; ctx.fillRect(0,0,w,h*.12);
      const capG2=ctx.createLinearGradient(0,h*.88,0,h);
      capG2.addColorStop(0,'rgba(200,230,255,0)'); capG2.addColorStop(1,'rgba(240,248,255,0.9)');
      ctx.fillStyle=capG2; ctx.fillRect(0,h*.88,w,h*.12);
      // Clouds
      for(let i=0;i<40;i++){
        const x=r()*w, y=r()*h, rx=r()*60+20, ry=r()*15+5;
        ctx.fillStyle=`rgba(255,255,255,${.15+r()*.2})`;
        ctx.beginPath(); ctx.ellipse(x,y,rx,ry,r()*.5,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'mars': {
      ctx.fillStyle='#8a2a00'; ctx.fillRect(0,0,w,h);
      const r=rng(33);
      // Terrain variation
      for(let i=0;i<300;i++){
        const x=r()*w, y=r()*h, rad=r()*30+3;
        const light=r()>.5;
        ctx.fillStyle=`rgba(${light?180:60},${light?80:20},${light?20:0},${r()*.4})`;
        ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      }
      // Valles Marineris canyon
      ctx.strokeStyle='rgba(60,10,0,0.5)'; ctx.lineWidth=h*.05;
      ctx.beginPath(); ctx.moveTo(w*.25,h*.5); ctx.bezierCurveTo(w*.4,h*.48,w*.6,h*.52,w*.75,h*.5); ctx.stroke();
      // Polar ice caps
      const pG=ctx.createLinearGradient(0,0,0,h*.15);
      pG.addColorStop(0,'rgba(240,230,220,0.9)'); pG.addColorStop(1,'rgba(180,150,120,0)');
      ctx.fillStyle=pG; ctx.fillRect(0,0,w,h*.15);
      const pG2=ctx.createLinearGradient(0,h*.85,0,h);
      pG2.addColorStop(0,'rgba(200,190,180,0)'); pG2.addColorStop(1,'rgba(240,230,220,0.8)');
      ctx.fillStyle=pG2; ctx.fillRect(0,h*.85,w,h*.15);
      break;
    }
    case 'jupiter': {
      ctx.fillStyle='#c4924a'; ctx.fillRect(0,0,w,h);
      const r=rng(51);
      // Horizontal bands
      const bands=[
        {y:.05,h:.08,c:'rgba(120,60,20,0.7)'},{y:.15,h:.05,c:'rgba(200,160,80,0.5)'},
        {y:.22,h:.1,c:'rgba(100,50,15,0.65)'},{y:.34,h:.06,c:'rgba(210,170,100,0.45)'},
        {y:.42,h:.08,c:'rgba(90,40,10,0.7)'},{y:.52,h:.06,c:'rgba(190,140,70,0.55)'},
        {y:.6,h:.07,c:'rgba(110,55,20,0.6)'},{y:.69,h:.08,c:'rgba(200,160,80,0.5)'},
        {y:.79,h:.07,c:'rgba(85,38,8,0.65)'},{y:.88,h:.1,c:'rgba(195,155,75,0.4)'},
      ];
      bands.forEach(b=>{
        // Wavy bands
        ctx.fillStyle=b.c; ctx.beginPath();
        ctx.moveTo(0,b.y*h);
        for(let x=0;x<=w;x+=20){
          const wave=Math.sin(x*.02)*h*.015;
          ctx.lineTo(x, b.y*h+wave);
        }
        for(let x=w;x>=0;x-=20){
          const wave=Math.sin(x*.02+.5)*h*.015;
          ctx.lineTo(x, (b.y+b.h)*h+wave);
        }
        ctx.closePath(); ctx.fill();
      });
      // Great Red Spot
      const grsX=w*.55, grsY=h*.55;
      const grsG=ctx.createRadialGradient(grsX,grsY,0,grsX,grsY,w*.06);
      grsG.addColorStop(0,'rgba(200,80,40,0.9)'); grsG.addColorStop(.5,'rgba(180,60,30,0.7)');
      grsG.addColorStop(1,'rgba(150,50,20,0)');
      ctx.fillStyle=grsG;
      ctx.save(); ctx.translate(grsX,grsY); ctx.scale(1.8,1);
      ctx.beginPath(); ctx.arc(0,0,w*.04,0,Math.PI*2); ctx.restore(); ctx.fill();
      break;
    }
    case 'saturn': {
      ctx.fillStyle='#dfd080'; ctx.fillRect(0,0,w,h);
      const r=rng(63);
      const bands2=[
        {y:.08,h:.06,c:'rgba(180,150,60,0.5)'},{y:.2,h:.1,c:'rgba(140,110,40,0.45)'},
        {y:.35,h:.08,c:'rgba(180,155,65,0.4)'},{y:.48,h:.07,c:'rgba(130,100,35,0.5)'},
        {y:.6,h:.08,c:'rgba(175,148,62,0.45)'},{y:.73,h:.07,c:'rgba(140,112,42,0.4)'},
        {y:.85,h:.1,c:'rgba(170,145,60,0.4)'},
      ];
      bands2.forEach(b=>{
        ctx.fillStyle=b.c; ctx.beginPath(); ctx.moveTo(0,b.y*h);
        for(let x=0;x<=w;x+=20){
          ctx.lineTo(x, b.y*h+Math.sin(x*.015)*h*.012);
        }
        for(let x=w;x>=0;x-=20){
          ctx.lineTo(x, (b.y+b.h)*h+Math.sin(x*.015+.3)*h*.012);
        }
        ctx.closePath(); ctx.fill();
      });
      // Polar hexagon (subtle)
      ctx.strokeStyle='rgba(160,130,50,0.3)'; ctx.lineWidth=3;
      ctx.beginPath();
      for(let i=0;i<7;i++){
        const a=i/6*Math.PI*2-Math.PI/2;
        const hx=w/2+Math.cos(a)*w*.08, hy=h*.12;
        i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
      }
      ctx.stroke();
      break;
    }
    case 'uranus': {
      ctx.fillStyle='#72d0d8'; ctx.fillRect(0,0,w,h);
      const r=rng(77);
      // Very subtle bands (almost featureless)
      for(let i=0;i<8;i++){
        const y=(i/8)*h, bh=h*.06;
        ctx.fillStyle=`rgba(${80+r()*30|0},${180+r()*30|0},${200+r()*20|0},0.15)`;
        ctx.fillRect(0,y,w,bh);
      }
      // Subtle cloud wisps
      for(let i=0;i<15;i++){
        const x=r()*w, y=h*.3+r()*h*.4;
        ctx.fillStyle=`rgba(200,240,255,${r()*.12})`;
        ctx.beginPath(); ctx.ellipse(x,y,r()*50+20,r()*8+3,0,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'neptune': {
      ctx.fillStyle='#3050c8'; ctx.fillRect(0,0,w,h);
      const r=rng(89);
      // Dark storm spot
      const dsDark=ctx.createRadialGradient(w*.3,h*.4,0,w*.3,h*.4,w*.08);
      dsDark.addColorStop(0,'rgba(10,10,80,0.8)'); dsDark.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=dsDark;
      ctx.save(); ctx.translate(w*.3,h*.4); ctx.scale(1.5,1);
      ctx.beginPath(); ctx.arc(0,0,w*.06,0,Math.PI*2); ctx.restore(); ctx.fill();
      // Cloud bands
      for(let i=0;i<12;i++){
        const y=r()*h, bh=r()*25+5;
        ctx.fillStyle=`rgba(${60+r()*40|0},${80+r()*40|0},${180+r()*50|0},0.3)`;
        ctx.fillRect(0,y,w,bh);
      }
      // Scooter cloud
      for(let i=0;i<10;i++){
        ctx.fillStyle=`rgba(180,200,255,${r()*.15})`;
        ctx.beginPath(); ctx.ellipse(r()*w,r()*h,r()*40+15,r()*10+4,r()*.5,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'moon': {
      ctx.fillStyle='#a0a0a0'; ctx.fillRect(0,0,w,h);
      const r=rng(99);
      for(let i=0;i<150;i++){
        const x=r()*w, y=r()*h, rad=r()*12+1;
        const dark=r()>.4;
        const g2=ctx.createRadialGradient(x,y,0,x,y,rad);
        g2.addColorStop(0,dark?'rgba(40,40,40,0.7)':'rgba(180,180,180,0.5)');
        g2.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'io': {
      ctx.fillStyle='#e8c840'; ctx.fillRect(0,0,w,h);
      const r=rng(103);
      // Volcanic patches
      for(let i=0;i<100;i++){
        const x=r()*w, y=r()*h, rad=r()*20+3;
        const cols=['rgba(180,60,0,0.8)','rgba(255,200,0,0.5)','rgba(100,80,0,0.6)','rgba(50,30,0,0.7)'];
        ctx.fillStyle=cols[Math.floor(r()*cols.length)];
        ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'europa': {
      ctx.fillStyle='#d8cec0'; ctx.fillRect(0,0,w,h);
      const r=rng(107);
      // Ice crack lines
      for(let i=0;i<80;i++){
        const x1=r()*w, y1=r()*h, x2=x1+(r()-.5)*200, y2=y1+(r()-.5)*200;
        ctx.strokeStyle=`rgba(${80+r()*60|0},${60+r()*40|0},${40+r()*30|0},${.3+r()*.4})`;
        ctx.lineWidth=r()*2+.5;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      }
      break;
    }
    case 'titan': {
      ctx.fillStyle='#b07828'; ctx.fillRect(0,0,w,h);
      const r=rng(113);
      // Thick haze bands
      for(let i=0;i<20;i++){
        const y=r()*h, bh=r()*30+10;
        ctx.fillStyle=`rgba(${150+r()*50|0},${100+r()*40|0},${20+r()*30|0},0.3)`;
        ctx.fillRect(0,y,w,bh);
      }
      break;
    }
    default: {
      const r=rng(137);
      const hue=r()*360;
      ctx.fillStyle=`hsl(${hue},40%,50%)`; ctx.fillRect(0,0,w,h);
      ctx.globalAlpha=.3; noise(ctx,w,h,rng(137)); ctx.globalAlpha=1;
    }
  }
  return new THREE.CanvasTexture(c);
}

function createRingTexture(narrow=false) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 1;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,512,0);
  if(narrow) {
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(.1,'rgba(0,0,0,0)');
    g.addColorStop(.15,'rgba(180,180,200,0.5)');
    g.addColorStop(.2,'rgba(0,0,0,0)');
    g.addColorStop(.3,'rgba(160,160,190,0.4)');
    g.addColorStop(.35,'rgba(0,0,0,0)');
    g.addColorStop(.5,'rgba(140,140,170,0.3)');
    g.addColorStop(.55,'rgba(0,0,0,0)');
    g.addColorStop(.85,'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(0,0,0,0)');
  } else {
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(.05,'rgba(180,160,120,0.1)');
    g.addColorStop(.1,'rgba(200,180,140,0.5)');
    g.addColorStop(.2,'rgba(180,160,120,0.8)');
    g.addColorStop(.3,'rgba(160,140,100,0.4)');
    g.addColorStop(.4,'rgba(200,180,140,0.7)');
    g.addColorStop(.5,'rgba(170,150,110,0.9)');
    g.addColorStop(.6,'rgba(150,130,90,0.6)');
    g.addColorStop(.7,'rgba(180,160,120,0.3)');
    g.addColorStop(.8,'rgba(160,140,100,0.5)');
    g.addColorStop(.9,'rgba(140,120,80,0.2)');
    g.addColorStop(.95,'rgba(160,140,100,0.1)');
    g.addColorStop(1,'rgba(0,0,0,0)');
  }
  ctx.fillStyle=g; ctx.fillRect(0,0,512,1);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

// ─── GESTURE DETECTOR ────────────────────────────────────────────────────────
class GestureDetector {
  constructor() {
    this.buffer = [];
    this.BUFFER_SIZE = 10;
    this.smoothed = null;
    this.EMA = 0.35;
    this.confirmed = 'none';
    this.prevPinch = -1;
    this.pinchVelocity = 0;
  }

  smooth(lm) {
    if (!this.smoothed) { this.smoothed = lm.map(l=>({...l})); return this.smoothed; }
    const a = this.EMA;
    this.smoothed = lm.map((l,i)=>({
      x: a*l.x + (1-a)*this.smoothed[i].x,
      y: a*l.y + (1-a)*this.smoothed[i].y,
      z: a*l.z + (1-a)*this.smoothed[i].z,
    }));
    return this.smoothed;
  }

  fingerExtended(lm, tip, pip) {
    // Compare tip to PIP joint relative to wrist
    const wrist = lm[0];
    const tipD = Math.hypot(lm[tip].x-wrist.x, lm[tip].y-wrist.y);
    const pipD = Math.hypot(lm[pip].x-wrist.x, lm[pip].y-wrist.y);
    return tipD > pipD * 1.08;
  }

  detect(rawLm) {
    const lm = this.smooth(rawLm);

    // Finger extension (tip vs PIP joint)
    const ext = [
      this.fingerExtended(lm, 8, 6),   // index
      this.fingerExtended(lm, 12, 10),  // middle
      this.fingerExtended(lm, 16, 14),  // ring
      this.fingerExtended(lm, 20, 18),  // pinky
    ];
    const extCount = ext.filter(Boolean).length;

    // Thumb extension (horizontal distance from index base)
    const thumbExt = Math.hypot(lm[4].x-lm[5].x, lm[4].y-lm[5].y) > 0.12;

    // Pinch detection (thumb tip to index tip distance)
    const pinchD = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
    if(this.prevPinch >= 0) this.pinchVelocity = pinchD - this.prevPinch;
    this.prevPinch = pinchD;
    const isPinching = pinchD < 0.055;

    // Point: only index extended
    const isPoint = ext[0] && !ext[1] && !ext[2] && !ext[3];

    // Open: 3+ fingers extended
    const isOpen = extCount >= 3;

    // Fist: all curled, thumb in
    const isFist = extCount === 0 && !thumbExt;

    // Peace/two fingers: index + middle extended only
    const isPeace = ext[0] && ext[1] && !ext[2] && !ext[3];

    let raw = 'none';
    if(isPinching) raw = 'pinch';
    else if(isFist) raw = 'fist';
    else if(isPoint) raw = 'point';
    else if(isPeace) raw = 'peace';
    else if(isOpen) raw = 'open';

    // Majority vote buffer
    this.buffer.push(raw);
    if(this.buffer.length > this.BUFFER_SIZE) this.buffer.shift();
    const counts = {};
    this.buffer.forEach(g => counts[g] = (counts[g]||0)+1);
    const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
    // Only update confirmed gesture if majority >= 60%
    if(top[1] >= Math.ceil(this.BUFFER_SIZE * 0.6)) {
      this.confirmed = top[0];
    }

    return {
      gesture: this.confirmed,
      raw,
      pinchDist: pinchD,
      pinchVelocity: this.pinchVelocity,
      landmarks: lm,
      indexTip: lm[8],
      palmCenter: lm[9],
    };
  }

  reset() { this.smoothed = null; this.buffer = []; this.prevPinch = -1; this.confirmed = 'none'; }
}

let scene, camera, renderer, raycaster;
let time = 0;
let targetCamZ = 55;
let transitioning = false;
let depthLevel = 0;
let systemStack = [];
let currentScene = null;
let hoveredPlanet = null;
let handSkeleton, handPoints, handGroup;

const gestureDetector = new GestureDetector();
let lastGesture = 'none';
let gestureCooldown = 0;
const GESTURE_COOLDOWN = 1.8; // seconds

const GESTURE_ICONS = { none:'✋', pinch:'🤏', point:'☝️', open:'🖐', fist:'✊', peace:'✌️' };
const GESTURE_LABELS = { none:'NO HAND', pinch:'PINCH · DIVE IN', point:'POINT · HOVER', open:'OPEN · SELECT', fist:'FIST · GO BACK', peace:'PEACE · ZOOM' };

// ─── SCENE BUILDER ────────────────────────────────────────────────────────────
function buildSolarSystem() {
  const group = new THREE.Group();
  const objects = []; // For raycasting & animation

  // Sun
  const sunGeo = new THREE.SphereGeometry(4.5, 64, 64);
  const sunTex = createTexture('sun', 512);
  const sunMat = new THREE.MeshBasicMaterial({ map: sunTex });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunMesh.userData = { name:'Sun', desc:'G-TYPE MAIN SEQUENCE STAR', type:'sun', isClickable:true };

  // Sun corona glow
  const coronaGeo = new THREE.SphereGeometry(5.2, 32, 32);
  const coronaMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(1, 0.7, 0),
    transparent:true, opacity:0.08, blending:THREE.AdditiveBlending, side:THREE.FrontSide
  });
  group.add(new THREE.Mesh(coronaGeo, coronaMat));

  // Sun outer glow
  const outerGlowGeo = new THREE.SphereGeometry(6.5, 32, 32);
  const outerGlowMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(1, 0.5, 0),
    transparent:true, opacity:0.03, blending:THREE.AdditiveBlending, side:THREE.BackSide
  });
  group.add(new THREE.Mesh(outerGlowGeo, outerGlowMat));

  group.add(sunMesh);
  objects.push({ mesh: sunMesh, type:'sun' });

  // Point light from sun
  const sunLight = new THREE.PointLight(0xffeeaa, 2.0, 200, 1.5);
  sunLight.position.set(0,0,0);
  group.add(sunLight);
  const ambLight = new THREE.AmbientLight(0x111133, 0.3);
  group.add(ambLight);

  // Planets
  PLANET_DATA.filter(p=>!p.isCenter).forEach((pd, idx) => {
    const orbitGroup = new THREE.Group();
    orbitGroup.rotation.y = pd.angle || 0;

    // Orbit line
    const orbitGeo = new THREE.BufferGeometry();
    const pts = [];
    for(let i=0;i<=256;i++){
      const a = (i/256)*Math.PI*2;
      pts.push(Math.cos(a)*pd.orbitR, 0, Math.sin(a)*pd.orbitR);
    }
    orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({
      color: 0x334466, transparent:true, opacity:0.25
    }));
    group.add(orbitLine);

    // Planet texture
    const texType = ['mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'][idx];
    const tex = createTexture(texType, texType==='earth'?1024:512);

    const pGeo = new THREE.SphereGeometry(pd.radius, 48, 48);
    const pMat = new THREE.MeshLambertMaterial({ map: tex });
    const pMesh = new THREE.Mesh(pGeo, pMat);
    pMesh.rotation.z = (pd.tilt||0) * Math.PI / 180;
    pMesh.userData = { name:pd.name, desc:pd.desc, type:'planet', planetData:pd, isClickable:true };

    // Atmosphere for some planets
    if(['earth','venus','uranus','neptune'].includes(texType)) {
      const atmColors = {earth:0x4488ff, venus:0xffcc44, uranus:0x44dddd, neptune:0x4466ff};
      const atmGeo = new THREE.SphereGeometry(pd.radius*1.06, 32, 32);
      const atmMat = new THREE.MeshBasicMaterial({
        color: atmColors[texType], transparent:true, opacity:0.07,
        blending:THREE.AdditiveBlending, side:THREE.BackSide
      });
      orbitGroup.add(new THREE.Mesh(atmGeo, atmMat));
    }

    // Saturn rings
    if(pd.hasRings) {
      const ringTex = createRingTexture(pd.ringsNarrow||false);
      const innerR = pd.radius * (pd.ringsNarrow ? 1.4 : 1.3);
      const outerR = pd.radius * (pd.ringsNarrow ? 2.0 : 2.6);
      const ringGeo = new THREE.RingGeometry(innerR, outerR, 128);
      // UV fix for ring texture
      const pos = ringGeo.attributes.position;
      const uv = ringGeo.attributes.uv;
      for(let i=0;i<pos.count;i++){
        const v = new THREE.Vector3().fromBufferAttribute(pos,i);
        const len = v.length();
        uv.setXY(i, (len-innerR)/(outerR-innerR), 0);
      }
      const ringMat = new THREE.MeshBasicMaterial({
        map: ringTex, transparent:true, opacity: pd.ringsNarrow?0.6:0.85,
        side:THREE.DoubleSide, blending:THREE.NormalBlending
      });
      const ringMesh = new THREE.Mesh(ringGeo, ringMat);
      ringMesh.rotation.x = Math.PI / 2;
      ringMesh.rotation.z = pd.ringsNarrow ? Math.PI/2 : 0;
      orbitGroup.add(ringMesh);
    }

    orbitGroup.add(pMesh);
    orbitGroup.position.x = pd.orbitR;

    group.add(orbitGroup);
    objects.push({
      mesh: pMesh,
      orbitGroup,
      pd,
      speed: pd.speed * 0.004,
      selfRotSpeed: 0.003 + Math.random()*0.005,
      type: 'planet'
    });
  });

  group.userData.objects = objects;
  return group;
}

function buildPlanetCloseup(pd) {
  const group = new THREE.Group();

  // Detect moon texture type
  const getMoonTex = (moon) => {
    const n = moon.name.toLowerCase();
    if(n==='moon') return 'moon';
    if(n==='io') return 'io';
    if(n==='europa') return 'europa';
    if(n==='titan') return 'titan';
    return 'moon';
  };

  // Ambient + directional
  group.add(new THREE.AmbientLight(0x223344, 0.4));
  const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
  dirLight.position.set(-10, 5, 10);
  group.add(dirLight);

  const texType = pd.type;
  const tex = createTexture(texType, 1024);
  const pGeo = new THREE.SphereGeometry(3, 64, 64);
  const pMat = new THREE.MeshLambertMaterial({ map: tex });
  const pMesh = new THREE.Mesh(pGeo, pMat);
  pMesh.userData = { name:pd.name, desc:pd.desc, isClickable:false };
  group.add(pMesh);

  // Atmosphere glow
  const atmColors = {earth:0x4488ff,venus:0xffcc44,uranus:0x44dddd,neptune:0x4466ff,mars:0xff6633};
  if(atmColors[texType]) {
    const atmGeo = new THREE.SphereGeometry(3.2, 32, 32);
    const atmMat = new THREE.MeshBasicMaterial({
      color:atmColors[texType], transparent:true, opacity:.12,
      blending:THREE.AdditiveBlending, side:THREE.BackSide
    });
    group.add(new THREE.Mesh(atmGeo, atmMat));
  }

  // Saturn rings in closeup
  if(pd.hasRings) {
    const rt = createRingTexture(pd.ringsNarrow||false);
    const ir = pd.ringsNarrow ? 4 : 3.8, or = pd.ringsNarrow ? 6 : 8;
    const rGeo = new THREE.RingGeometry(ir, or, 128);
    const pos = rGeo.attributes.position; const uv = rGeo.attributes.uv;
    for(let i=0;i<pos.count;i++){
      const v = new THREE.Vector3().fromBufferAttribute(pos,i);
      uv.setXY(i,(v.length()-ir)/(or-ir),0);
    }
    const rMat = new THREE.MeshBasicMaterial({
      map:rt, transparent:true, opacity:pd.ringsNarrow?0.6:0.85, side:THREE.DoubleSide
    });
    const rMesh = new THREE.Mesh(rGeo, rMat);
    rMesh.rotation.x = Math.PI/2;
    group.add(rMesh);
  }

  const objects = [{ mesh:pMesh, type:'planet-center', selfRotSpeed:0.004 }];

  // Moons
  pd.moons.forEach((moon, i) => {
    const orbitGeo = new THREE.BufferGeometry();
    const pts = [];
    for(let j=0;j<=256;j++){
      const a=(j/256)*Math.PI*2;
      pts.push(Math.cos(a)*moon.orbitR*2.5,0,Math.sin(a)*moon.orbitR*2.5);
    }
    orbitGeo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    group.add(new THREE.Line(orbitGeo,new THREE.LineBasicMaterial({color:0x334466,transparent:true,opacity:0.2})));

    const mTex = createTexture(getMoonTex(moon), 256);
    const mGeo = new THREE.SphereGeometry(moon.radius*2, 32, 32);
    const mMat = new THREE.MeshLambertMaterial({ map: mTex });
    const mMesh = new THREE.Mesh(mGeo, mMat);
    mMesh.userData = { name:moon.name, desc:moon.desc||'NATURAL SATELLITE', isClickable:false };

    const orbitR = moon.orbitR * 2.5;
    const angle = (i / pd.moons.length) * Math.PI * 2;
    mMesh.position.set(Math.cos(angle)*orbitR, 0, Math.sin(angle)*orbitR);

    group.add(mMesh);
    objects.push({ mesh:mMesh, type:'moon', orbitR, angle, speed:(moon.speed||5)*0.001*Math.sign(moon.speed||1) });
  });

  group.userData.objects = objects;
  group.userData.planet = pd;
  return group;
}

// ─── THREE INIT ───────────────────────────────────────────────────────────────
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000008, 0.002);

  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 2000);
  camera.position.z = 55;

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x00000a);
  document.body.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  raycaster.params.Points = { threshold: 0.3 };

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const sp = new Float32Array(12000*3), sc = new Float32Array(12000*3);
  const starRng = (() => { let s=999; return () => { s=(s*16807)%2147483647; return (s-1)/2147483646; }; })();
  for(let i=0;i<12000;i++){
    sp[i*3]=(starRng()-.5)*2000; sp[i*3+1]=(starRng()-.5)*2000; sp[i*3+2]=(starRng()-.5)*2000;
    const b=.3+starRng()*.7;
    const tint=starRng();
    sc[i*3]=b*(tint>.7?.9:tint>.4?1:.8);
    sc[i*3+1]=b*(tint>.7?.85:tint>.4?.95:1);
    sc[i*3+2]=b*(tint>.7?1:tint>.4?.85:.9);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(sc,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    size:.5, vertexColors:true, transparent:true, opacity:.75,
    blending:THREE.AdditiveBlending, sizeAttenuation:true
  })));

  // 3D hand skeleton
  handGroup = new THREE.Group();
  handSkeleton = new THREE.LineSegments(
    new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({color:0x00bbff,transparent:true,opacity:.6})
  );
  handPoints = new THREE.Points(
    new THREE.BufferGeometry(),
    new THREE.PointsMaterial({color:0x00eeff,size:.1,transparent:true,blending:THREE.AdditiveBlending})
  );
  handGroup.add(handSkeleton); handGroup.add(handPoints);
  handGroup.position.set(0,0,-8);
  handGroup.visible = false;
  camera.add(handGroup);
  scene.add(camera);

  // Build initial scene
  currentScene = buildSolarSystem();
  scene.add(currentScene);

  // Events
  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  addEventListener('wheel', e => {
    targetCamZ = Math.max(6, Math.min(120, targetCamZ + e.deltaY*.04));
  });
  renderer.domElement.addEventListener('click', onClickDive);
  addEventListener('contextmenu', e => { e.preventDefault(); onZoomOut(); });
  renderer.domElement.addEventListener('mousemove', onMouseMove);

  startHandTracking();
  animate();
}

// ─── HOVER ────────────────────────────────────────────────────────────────────
const mouse2d = new THREE.Vector2();
function onMouseMove(e) {
  mouse2d.x = (e.clientX/innerWidth)*2-1;
  mouse2d.y = -(e.clientY/innerHeight)*2+1;

  const hn = document.getElementById('hover-name');
  if(!currentScene) { hn.style.opacity=0; return; }

  raycaster.setFromCamera(mouse2d, camera);
  const meshes = (currentScene.userData.objects||[]).map(o=>o.mesh).filter(Boolean);
  const hits = raycaster.intersectObjects(meshes, true);
  if(hits.length>0 && hits[0].object.userData.isClickable) {
    const ud = hits[0].object.userData;
    hn.textContent = ud.name;
    hn.style.left = (e.clientX+15)+'px';
    hn.style.top = (e.clientY-10)+'px';
    hn.style.opacity = 1;
    renderer.domElement.style.cursor = 'pointer';
    hoveredPlanet = ud;
  } else {
    hn.style.opacity = 0;
    renderer.domElement.style.cursor = 'crosshair';
    hoveredPlanet = null;
  }
}

// ─── DIVE / ZOOM OUT ─────────────────────────────────────────────────────────
function diveIntoPlanet(hitObject) {
  if(transitioning || !hitObject) return;
  const ud = hitObject.userData;
  if(!ud.isClickable) return;

  transitioning = true;

  // Show label
  document.getElementById('pl-name').textContent = ud.name;
  document.getElementById('pl-name').style.color = ud.name==='Sun'?'#ffcc44':'#88ccff';
  document.getElementById('pl-sub').textContent = ud.desc||'';
  const label = document.getElementById('planet-label');
  label.style.opacity = 1;
  setTimeout(()=>label.style.opacity=0, 2500);

  if(ud.name==='Sun' || !ud.planetData) {
    // Just zoom into current view center
    setTimeout(()=>{ transitioning=false; },600);
    return;
  }

  const pd = ud.planetData;
  systemStack.push({ scene:currentScene, camZ:camera.position.z, depth:depthLevel });
  depthLevel++;

  const newScene = buildPlanetCloseup(pd);
  newScene.scale.set(0.01,0.01,0.01);
  scene.add(newScene);

  const oldScene = currentScene;
  currentScene = newScene;

  let p = 0;
  const startZ = camera.position.z;

  function transAnim() {
    p += 0.022;
    const t = Math.min(1, p);
    const ease = t<.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.z = THREE.MathUtils.lerp(startZ, 15, ease);
    const s = 0.01 + ease*0.99;
    newScene.scale.set(s,s,s);
    oldScene.children.forEach(c => { if(c.material) c.material.opacity = 1-ease; });
    if(t<1) requestAnimationFrame(transAnim);
    else {
      scene.remove(oldScene);
      newScene.scale.set(1,1,1);
      camera.position.z = 15;
      targetCamZ = 15;
      transitioning = false;
      updateUI(pd.name, pd.desc);
    }
  }
  transAnim();
}

function onClickDive(e) {
  if(transitioning) return;
  mouse2d.x = (e.clientX/innerWidth)*2-1;
  mouse2d.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2d, camera);
  const meshes = (currentScene?.userData.objects||[]).map(o=>o.mesh).filter(Boolean);
  const hits = raycaster.intersectObjects(meshes, true);
  if(hits.length>0) diveIntoPlanet(hits[0].object);
}

function onZoomOut() {
  if(transitioning || systemStack.length===0) return;
  transitioning = true;
  const prev = systemStack.pop();
  depthLevel = prev.depth;
  const oldScene = currentScene;
  scene.add(prev.scene);

  let p = 0;
  function outAnim() {
    p += 0.025;
    const t = Math.min(1,p);
    const ease = t<.5?2*t*t:-1+(4-2*t)*t;
    const s = 1 - ease*0.99;
    oldScene.scale.set(s,s,s);
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, prev.camZ, 0.06);
    if(t<1) requestAnimationFrame(outAnim);
    else {
      scene.remove(oldScene);
      currentScene = prev.scene;
      camera.position.z = prev.camZ;
      targetCamZ = prev.camZ;
      transitioning = false;
      updateUI('SOLAR SYSTEM','');
    }
  }
  outAnim();
}

function updateUI(name, desc) {
  document.getElementById('depth').textContent = name || 'SOLAR SYSTEM';
  document.getElementById('back-btn').style.display = systemStack.length>0 ? 'block':'none';
}

// ─── HAND TRACKING ────────────────────────────────────────────────────────────
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
];

async function startHandTracking() {
  const video = document.getElementById('hand-video');
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({
    maxNumHands: 1, modelComplexity: 1,
    minDetectionConfidence: 0.75, minTrackingConfidence: 0.8
  });

  hands.onResults(results => {
    if(gestureCooldown > 0) gestureCooldown -= 0.016;

    const gIcon = document.getElementById('gesture-icon');
    const gName = document.getElementById('gesture-name');
    const gZoom = document.getElementById('g-zoom');
    const gAction = document.getElementById('g-action');

    if(results.multiHandLandmarks?.length > 0) {
      const lm = results.multiHandLandmarks[0];
      handGroup.visible = true;
      gestureDetector.EMA = 0.35;

      const result = gestureDetector.detect(lm);
      const { gesture, pinchDist, pinchVelocity, landmarks, palmCenter } = result;

      // Update 3D hand skeleton
      const positions = [], linePositions = [];
      landmarks.forEach(l => {
        positions.push(((1-l.x)-.5)*12, -(l.y-.5)*8, 0);
      });
      HAND_CONNECTIONS.forEach(([s,e]) => {
        linePositions.push(...positions.slice(s*3,s*3+3), ...positions.slice(e*3,e*3+3));
      });
      handPoints.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
      handSkeleton.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions,3));

      // UI update
      gIcon.textContent = GESTURE_ICONS[gesture] || '✋';
      gName.textContent = GESTURE_LABELS[gesture] || gesture.toUpperCase();

      // Pinch zoom (smooth, with dead zone)
      const pinchZoom = (pinchDist - 0.055) * -200; // negative = zoom in when pinching
      if(gesture === 'pinch') {
        gZoom.textContent = `${pinchZoom>0?'+':''}${pinchZoom.toFixed(0)}`;
        targetCamZ = Math.max(5, Math.min(120, targetCamZ + pinchVelocity * -60));
      } else if(gesture === 'peace') {
        // Peace sign: use hand height for zoom
        const palmY = palmCenter.y;
        targetCamZ = Math.max(5, Math.min(120, targetCamZ + (palmY-.5)*0.3));
        gZoom.textContent = `${palmY.toFixed(2)}`;
      } else {
        gZoom.textContent = `${(1-pinchDist).toFixed(2)}`;
      }

      // Action gestures (with cooldown)
      if(gestureCooldown <= 0 && gesture !== lastGesture) {
        if(gesture === 'open' && !transitioning) {
          // Open palm → select/dive at palm position
          const mx = ((1-palmCenter.x)-.5)*2;
          const my = -(palmCenter.y-.5)*2;
          const tempMouse = new THREE.Vector2(mx, my);
          raycaster.setFromCamera(tempMouse, camera);
          const meshes = (currentScene?.userData.objects||[]).map(o=>o.mesh).filter(Boolean);
          const hits = raycaster.intersectObjects(meshes, true);
          if(hits.length>0 && hits[0].object.userData.isClickable) {
            diveIntoPlanet(hits[0].object);
            gestureCooldown = GESTURE_COOLDOWN;
            gAction.textContent = 'DIVING IN...';
          }
        } else if(gesture === 'fist' && systemStack.length>0) {
          onZoomOut();
          gestureCooldown = GESTURE_COOLDOWN;
          gAction.textContent = 'GOING BACK...';
        } else {
          gAction.textContent = gesture.toUpperCase();
        }
        lastGesture = gesture;
      }

    } else {
      handGroup.visible = false;
      gestureDetector.reset();
      gIcon.textContent = '✋';
      gName.textContent = 'NO HAND';
      gZoom.textContent = '—';
      gAction.textContent = '—';
      lastGesture = 'none';
    }
  });

  try {
    if(typeof Camera !== 'undefined') {
      new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
      }).start();
    } else {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480, facingMode:'user' } });
      video.srcObject = stream;
      await video.play();
      const loop = async () => { await hands.send({ image:video }); requestAnimationFrame(loop); };
      loop();
    }
  } catch(e) {
    console.log('Camera unavailable:', e);
    document.getElementById('gesture-name').textContent = 'NO CAMERA';
  }
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Smooth zoom
  camera.position.z += (targetCamZ - camera.position.z) * 0.07;

  if(currentScene && !transitioning) {
    const objects = currentScene.userData.objects || [];

    // Gentle scene rotation
    if(depthLevel === 0) currentScene.rotation.y += 0.0005;

    objects.forEach(obj => {
      if(!obj.mesh) return;

      // Self rotation
      if(obj.selfRotSpeed) obj.mesh.rotation.y += obj.selfRotSpeed;

      // Orbit animation (solar system level)
      if(obj.orbitGroup && obj.speed) {
        obj.orbitGroup.rotation.y += obj.speed;
      }

      // Moon orbits (planet closeup)
      if(obj.type==='moon') {
        obj.angle = (obj.angle||0) + obj.speed;
        obj.mesh.position.x = Math.cos(obj.angle) * obj.orbitR;
        obj.mesh.position.z = Math.sin(obj.angle) * obj.orbitR;
        obj.mesh.rotation.y += 0.01;
      }

      // Sun pulsing glow
      if(obj.type==='sun') {
        const pulse = 1 + Math.sin(time*2)*.03;
        obj.mesh.scale.set(pulse,pulse,pulse);
      }
    });
  }

  renderer.render(scene, camera);
}

window.onload = init;
updateUI('SOLAR SYSTEM','');
</script>
