<!-- Video Loop Control Logic Implementation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('hero-vid');
            if (!video) return;

            const FADE_DURATION = 0.5; // seconds
            const WAIT_BEFORE_RESTART = 100; // ms

            const updateVideoOpacity = () => {
                if (!video.duration) {
                    requestAnimationFrame(updateVideoOpacity);
                    return;
                }

                const currentTime = video.currentTime;
                const duration = video.duration;

                // Fade in logic
                if (currentTime < FADE_DURATION) {
                    video.style.opacity = currentTime / FADE_DURATION;
                } 
                // Fade out logic
                else if (currentTime > (duration - FADE_DURATION)) {
                    video.style.opacity = (duration - currentTime) / FADE_DURATION;
                } 
                // Stable middle
                else {
                    video.style.opacity = 1;
                }

                requestAnimationFrame(updateVideoOpacity);
            };

            video.addEventListener('ended', () => {
                video.style.opacity = 0;
                setTimeout(() => {
                    video.currentTime = 0;
                    video.play();
                }, WAIT_BEFORE_RESTART);
            });

            // Start the monitoring loop
            requestAnimationFrame(updateVideoOpacity);
        });
    </script>
